<!DOCTYPE html>

<head>

<title>アンビテーナ LP｜FV 白黒ワイヤーフレーム 3案</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#f4f5f6;font-family:"Hiragino Sans","Noto Sans JP",sans-serif;color:#222;padding:32px;}
  h1{font-size:22px;font-weight:800;margin-bottom:6px;}
  .desc{color:#777;font-size:14px;margin-bottom:24px;line-height:1.7;}
  .links a{color:#1769ff;text-decoration:none;font-size:14px;margin-right:18px;}
  .links a:hover{text-decoration:underline;}
  .row{display:flex;gap:16px;margin:24px 0 36px;flex-wrap:wrap;}
  .card{background:#fff;border:1px solid #dcdfe3;border-radius:10px;overflow:hidden;width:600px;max-width:100%;}
  .card .ct{padding:12px 16px;font-size:14px;font-weight:700;border-bottom:1px solid #eee;}
  .card .ct small{display:block;color:#888;font-weight:400;margin-top:3px;line-height:1.5;}
  .scale{width:600px;height:366px;overflow:hidden;max-width:100%;}
  .scale iframe{width:1280px;height:780px;border:0;transform:scale(.469);transform-origin:top left;}
</style>
</head>
<body>
  <h1>株式会社アンビテーナ｜FV 白黒ワイヤーフレーム 3案</h1>

  <div class="row">
    <div class="card">
      <div class="ct">①「合う会社」訴求<small>成果は出している。あとは、合う会社だけ。</small></div>

    </div>
    <div class="card">
      <div class="ct">②「評価される会社」訴求<small>次に行くべきは、あなたを"正しく評価する"会社。</small></div>
      <div class="scale"><iframe src="p2.html" scrolling="no"></iframe></div>
    </div>
    <div class="card">
      <div class="ct">③「今の会社への違和感」訴求<small>今の会社で、力を出しきれていないあなたへ。</small></div>
      <div class="scale"><iframe src="p3.html" scrolling="no"></iframe></div>
    </div>
  </div>
