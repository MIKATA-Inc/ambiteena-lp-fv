<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>WF ③ターゲット明確化型｜アンビテーナ（白黒ワイヤーフレーム）</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#e9eaec;font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
       display:flex;flex-direction:column;align-items:center;padding:24px;gap:8px;color:#1a1a1a;}
  .label{color:#888;font-size:13px;}
  .artboard{position:relative;width:1280px;height:780px;background:#fff;border:1px solid #cfd2d6;overflow:hidden;}
  .header{position:absolute;top:0;left:0;width:100%;height:72px;display:flex;align-items:center;
          justify-content:space-between;padding:0 56px;border-bottom:1px solid #ececec;}
  .logo{width:96px;height:30px;border:1px solid #b9bdc2;border-radius:3px;display:flex;
        align-items:center;justify-content:center;color:#9aa0a6;font-size:12px;}
  .nav{display:flex;gap:32px;margin-left:auto;margin-right:32px;}
  .nav span{color:#666;font-size:14px;}
  .top-cta{border:1px solid #333;color:#222;font-size:13px;padding:0 20px;height:40px;
           display:flex;align-items:center;border-radius:4px;}
  .content{position:absolute;left:56px;top:150px;width:600px;}
  .tag{display:inline-block;font-size:28px;font-weight:800;color:#111;letter-spacing:-.01em;margin-bottom:14px;}
  .subabove{font-size:18px;color:#444;font-weight:600;margin-bottom:12px;}
  h1{font-size:40px;line-height:1.32;font-weight:800;color:#111;}
  .lead{font-size:15px;line-height:1.9;color:#555;margin-top:20px;max-width:560px;}
  .cta{display:inline-flex;align-items:center;gap:10px;background:#222;color:#fff;font-weight:700;
       font-size:16px;height:56px;padding:0 26px;border-radius:6px;margin-top:30px;}
  .cta .lc{border:1px solid #fff;font-size:11px;padding:2px 7px;border-radius:4px;}
  .cta::after{content:"▶";font-size:11px;}
  .micro{font-size:12px;color:#888;margin-top:12px;}
  .visual{position:absolute;right:56px;top:140px;width:470px;height:420px;border:1px solid #c4c8cc;
          background:
            linear-gradient(to top right,transparent calc(50% - 1px),#d4d7db calc(50% - 1px),#d4d7db calc(50% + 1px),transparent calc(50% + 1px)),
            linear-gradient(to top left,transparent calc(50% - 1px),#d4d7db calc(50% - 1px),#d4d7db calc(50% + 1px),transparent calc(50% + 1px));
          display:flex;align-items:center;justify-content:center;}
  .visual span{background:#fff;padding:4px 10px;color:#9aa0a6;font-size:13px;}
  .empathy{position:absolute;left:56px;right:56px;bottom:30px;border-top:1px dashed #d4d7db;padding-top:18px;}
  .empathy .e1{font-size:12px;color:#aaa;letter-spacing:.1em;}
  .empathy .e2{font-size:22px;font-weight:800;color:#ccc;margin-top:6px;}
</style>
</head>
<body>
  <div class="label">PC_WF_1280w ／ ③「今の会社への違和感」訴求（白黒ワイヤーフレーム）</div>
  <div class="artboard">
    <div class="header">
      <div class="logo">ロゴ</div>
      <div class="nav"><span>サービス</span><span>事例</span><span>代表ご挨拶</span></div>
      <div class="top-cta">LINEで無料相談</div>
    </div>

    <div class="visual"><span>メインビジュアル（実写・人物）<br><small style="font-size:11px;color:#aab;">きれいめ／落ち着いた自信のある若手プロの質感。困り顔・就活生臭・ラフすぎNG</small></span></div>

    <div class="content">
      <div class="tag">ハイポテンシャル転職</div>
      <p style="font-size:15px;color:#555;line-height:1.6;margin-bottom:16px;">学歴も、今の会社の規模も関係ない。</p>
      <h1>その実力、今の会社で<br>活かせてますか？</h1>
      <p class="lead">同じ力でも、活かせる会社は必ずあります。次の一社を、一緒に見つけます。</p>
      <div class="cta"><span class="lc">LINE</span>自分に合う会社を相談する</div>
      <p class="micro">登録1分／LINEで完結／しつこい連絡はしません</p>
    </div>

    <div class="empathy">
      <div class="e1">EMPATHY</div>
      <div class="e2">こんなこと、思い当たりませんか。</div>
    </div>
  </div>
</body>
</html>
